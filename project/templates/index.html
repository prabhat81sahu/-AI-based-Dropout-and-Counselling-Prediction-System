<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dropout Risk Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</head>
<body>
    <div class="container">
        <h1 class="page-title">Student Dropout Risk Prediction</h1>
        <form method="post" action="/predict" class="prediction-form">
            <div class="form-group">
                <label>Grades:</label>
                <input name="grades" type="number" step="any" required>
            </div>
            <div class="form-group">
                <label>GPA:</label>
                <input name="gpa" type="number" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Attendance (%):</label>
                <input name="attendance" type="number" step="0.1" required>
            </div>
            <div class="form-group">
                <label>Behavior:</label>
                <select name="behavior">
                    <option value="good">Good</option>
                    <option value="average">Average</option>
                    <option value="poor">Poor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Socio-economic status:</label>
                <select name="socio_eco">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <button type="submit" class="btn">Predict Risk</button>
        </form>
        <div class="recommendations">
            <h2>Suggested Counselling</h2>
            <ul id="rec-list"></ul>
        </div>
        <p><a href="{{ url_for('retrain') }}">Retrain Model (admin)</a> | <a href="{{ url_for('dashboard') }}">Dashboard</a></p>
    </div>
</body>
</html>
