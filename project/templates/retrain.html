<!DOCTYPE html>
<html lang="en">
<head>

    <title>Retrain Model</title>

</head>
<body>
    <div class="container">
        <h1>Retrain Model</h1>

        <a href="{{ url_for('home') }}" class="btn">Home</a>
    </div>

</html>
